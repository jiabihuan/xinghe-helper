name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK
        run: |
          ./gradlew assembleDebug assembleRelease --no-daemon --parallel --no-build-cache > build.log 2>&1
          exit_code=$?
          if [ $exit_code -ne 0 ]; then
            # 提取关键错误信息
            FAILURE_LINE=$(grep "FAILURE:" build.log | head -1)
            ERROR_COUNT=$(grep -c "error:" build.log || echo 0)
            echo "::warning::BUILD_FAILED_FAILURE_${FAILURE_LINE// /_}_ERRORS_${ERROR_COUNT}"
            echo "::error::Build failed with ${ERROR_COUNT} errors"
          fi
          exit $exit_code
        shell: bash

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build.log

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xinghe-helper-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xinghe-helper-release
          path: app/build/outputs/apk/release/*.apk